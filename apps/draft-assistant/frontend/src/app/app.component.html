<div class="app-shell">
  <mat-toolbar color="primary" class="app-toolbar">
    <span class="app-title">Draft Assistant</span>
    <mat-form-field appearance="outline" class="density-field">
      <mat-label>Density</mat-label>
      <mat-select [value]="appStore.densityScale()" (selectionChange)="onDensityChange($event)">
        @for (density of densityOptions; track density) {
          <mat-option [value]="density">{{ densityLabel(density) }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    @if (appStore.selectedLeague()) {
      <span class="toolbar-league">
        <mat-icon>check_circle</mat-icon>
        {{ appStore.selectedLeague()!.name }}
      </span>
    }
  </mat-toolbar>

  <nav mat-tab-nav-bar [tabPanel]="tabPanel" class="app-nav">
    @for (link of navLinks; track link.path) {
      <a
        mat-tab-link
        [routerLink]="link.path"
        routerLinkActive
        #rla="routerLinkActive"
        [active]="rla.isActive"
      >
        {{ link.label }}
      </a>
    }
  </nav>

  <mat-tab-nav-panel #tabPanel>
    <main class="app-content">
      <router-outlet />
    </main>
  </mat-tab-nav-panel>
</div>
