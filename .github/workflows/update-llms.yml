name: Update llms.txt

on:
  push:
    branches:
      - main
    paths-ignore:
      - llms.txt
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-llms
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Refresh llms.txt from Gitingest
        env:
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          curl --fail --silent --show-error --location --retry 3 \
            "https://gitingest.com/api/ingest" \
            --header "Content-Type: application/json" \
            --data "{\"input_text\":\"${REPOSITORY_URL}\",\"max_file_size\":51200,\"pattern_type\":\"exclude\",\"pattern\":\"\",\"token\":\"\"}" \
            --output ingest-response.json

          DIGEST_URL=$(python3 -c 'import json; import sys; print(json.load(open("ingest-response.json"))["digest_url"])')

          curl --fail --silent --show-error --location --retry 3 \
            "${DIGEST_URL}" \
            --output llms.txt

          rm -f ingest-response.json

      - name: Commit refreshed llms.txt
        run: |
          if git diff --quiet -- llms.txt; then
            echo "llms.txt is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add llms.txt
          git commit -m "chore: refresh llms.txt"
          git push
