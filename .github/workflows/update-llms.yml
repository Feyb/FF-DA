name: Update llms.txt

on:
  push:
    branches:
      - main
    paths-ignore:
      - llms.txt
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-llms
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Refresh llms.txt from Gitingest
        env:
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          curl --fail --silent --show-error --location --retry 3 \
            --get \
            --data-urlencode "repo=${REPOSITORY_URL}" \
            "https://gitingest.com/llms.txt" \
            --output llms.txt

      - name: Commit refreshed llms.txt
        run: |
          if git diff --quiet -- llms.txt; then
            echo "llms.txt is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add llms.txt
          git commit -m "chore: refresh llms.txt"
          git push
