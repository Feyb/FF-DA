name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Lint project
        run: pnpm draft-assistant:lint

      - name: Check formatting
        run: pnpm draft-assistant:fmt:check

      - name: Build & deploy to GitHub Pages (gh-pages branch)
        # angular-cli-ghpages builds with baseHref=/FF-DA/ (from angular.json deploy options)
        # then pushes the output to the gh-pages branch.
        # GH_TOKEN grants the runner write access to push to gh-pages.
        run: pnpm draft-assistant:deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
