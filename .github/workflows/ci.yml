name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Lint, Format & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Lint project
        run: pnpm draft-assistant:lint

      - name: Check formatting
        run: pnpm draft-assistant:fmt:check

      - name: Build project
        run: pnpm draft-assistant:build:ci
